name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lmis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: eswatini_lmis_backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./eswatini_lmis_backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./eswatini_lmis_backend
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: lmis_test
          DB_PORT: 5432
          JWT_SECRET: test_secret_key
          NODE_ENV: test
        run: npm test || echo "No tests configured yet"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: eswatini_lmis_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./eswatini_lmis_frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./eswatini_lmis_frontend
        run: npm test -- --watchAll=false || echo "No tests configured yet"

      - name: Build frontend
        working-directory: ./eswatini_lmis_frontend
        run: npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: lmis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./eswatini_lmis_frontend
          file: ./eswatini_lmis_frontend/Dockerfile
          push: false
          tags: lmis-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./eswatini_lmis_backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./eswatini_lmis_frontend
        run: npm ci

      - name: Lint backend
        working-directory: ./eswatini_lmis_backend
        run: npm run lint || echo "No lint script configured"

      - name: Lint frontend
        working-directory: ./eswatini_lmis_frontend
        run: npm run lint || echo "No lint script configured"