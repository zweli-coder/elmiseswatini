version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: lmis_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lmis}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./eswatini_lmis_backend
      dockerfile: Dockerfile
    container_name: lmis_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-lmis}
      JWT_SECRET: ${JWT_SECRET:-lmis_secret_key_2026}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./eswatini_lmis_backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./eswatini_lmis_frontend
      dockerfile: Dockerfile
    container_name: lmis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
