version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: lmis_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-superuser}
      POSTGRES_DB: ${DB_NAME:-eswatini_lmis}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ghcr.io/${GITHUB_REPO}/eswatini-lmis-backend:latest
    container_name: lmis_backend
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-eswatini_lmis}
      DB_PASSWORD: ${DB_PASSWORD:-superuser}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./eswatini_lmis_backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    image: ghcr.io/${GITHUB_REPO}/eswatini-lmis-frontend:latest
    container_name: lmis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
