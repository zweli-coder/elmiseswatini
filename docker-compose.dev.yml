version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: lmis_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superuser
      POSTGRES_DB: eswatini_lmis
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./eswatini_lmis_backend
      dockerfile: Dockerfile
    container_name: lmis_backend
    environment:
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: eswatini_lmis
      DB_PASSWORD: superuser
      DB_PORT: 5432
      JWT_SECRET: eswatini_lmis_jwt_secret_2026_secure_key
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./eswatini_lmis_backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./eswatini_lmis_frontend
      dockerfile: Dockerfile
    container_name: lmis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
